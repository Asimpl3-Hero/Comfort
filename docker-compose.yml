services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_COP_TO_USD_RATE: ${VITE_COP_TO_USD_RATE}
        VITE_WOMPI_BASE_URL: ${VITE_WOMPI_BASE_URL}
        VITE_WOMPI_PUBLIC_KEY: ${VITE_WOMPI_PUBLIC_KEY}
    restart: unless-stopped
    ports:
      - '5173:5173'
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
